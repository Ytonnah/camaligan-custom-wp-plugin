		<div id="officeBanner_holder">
			<style>
				div#officeBanner_holder
				{
					background: black;
					/*width: 300px!important;
					height: 332px;*/
					margin: auto;
				}

				div#officeBanner_holder svg
				{
					width: 100%;
					filter: grayscale(100%);
				}

				div#childHolderA
				{
					width: 48%;
					float: left;
					padding-left: 2%;
				}

				div#childHolderB
				{
					width: 48%;
					float: left;
					padding-right: 2%;
				}

				div#officeBanner_holder svg
				{
					cursor: default;
					animation: svg_animation_banner_reverse 0.5s ease-in-out;
					filter: grayscale(100%);
				}

				@keyframes svg_animation_banner_reverse
				{
					from{filter: grayscale(0%);}
					to{filter: grayscale(100%)}
				}

				div#officeBanner_holder svg:hover
				{
					cursor: pointer;
					animation: svg_animation_banner 0.25s ease-in-out;
					filter: grayscale(0%);
				}

				@keyframes svg_animation_banner
				{
					0%{
						filter: grayscale(100%);
					}
					
					100%{
						filter: grayscale(0%);
					}
				}
			</style>
